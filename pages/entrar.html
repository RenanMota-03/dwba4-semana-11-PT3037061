<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <title>Entrar - IFSP</title>

    <style>
      .form-signin {
        width: 100%;
        max-width: 330px;
        padding: 15px;
        margin: 40px auto 0;
      }
      .form-signin .form-control {
        position: relative;
        box-sizing: border-box;
        height: auto;
        padding: 10px;
        font-size: 16px;
      }
      .form-signin .form-control:focus {
        z-index: 2;
      }
      .form-signin input[type="email"] {
        margin-bottom: -1px;
        border-bottom-right-radius: 0;
        border-bottom-left-radius: 0;
      }
      .form-signin input[type="password"] {
        margin-bottom: 10px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }
      .mini-logo {
        width: 45px;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <header id="cabecalho-componente"></header>

    <main class="form-signin text-center">
      <form
        onsubmit="
          event.preventDefault();
          this.reset();
        "
      >
        <img
          class="mb-4 mini-logo"
          src="../assets/images/ifsp.png"
          alt="Logo IFSP"
        />

        <h1 class="h4 mb-3 fw-normal">Faça login</h1>

        <label for="inputEmail" class="visually-hidden">Seu email</label>
        <input
          type="email"
          id="inputEmail"
          class="form-control"
          placeholder="Seu email"
          required
          autofocus
        />

        <label for="inputPassword" class="visually-hidden">Senha</label>
        <input
          type="password"
          id="inputPassword"
          class="form-control"
          placeholder="Senha"
          required
        />

        <div class="form-check d-flex justify-content-center mb-3 mt-2">
          <input
            class="form-check-input me-2"
            type="checkbox"
            value="remember-me"
            id="lembrarMim"
          />
          <label class="form-check-label" for="lembrarMim">
            Lembrar de mim
          </label>
        </div>

        <a href="#" class="d-block mb-3 text-decoration-none"
          >Esqueci a senha</a
        >

        <button class="w-100 btn btn-lg btn-primary" type="submit">
          Login
        </button>

        <p class="mt-5 mb-3 text-muted">&copy; 2026</p>
      </form>
    </main>

    <footer id="rodape-componente" style="margin-top: 60px"></footer>

    <script src="../assets/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
