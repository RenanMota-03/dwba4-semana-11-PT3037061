<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <title>Sobre - IFSP</title>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <header id="cabecalho-componente"></header>

    <main>
      <div id="root-sobre"></div>
    </main>

    <footer id="rodape-componente"></footer>

    <script src="../assets/js/components.js"></script>

    <script type="text/babel">
      function SobreConteudo() {
        return (
          <div className="sobre-texto">
            <p>
              O{" "}
              <strong>
                Instituto Federal de Educação, Ciência e Tecnologia de São Paulo
              </strong>{" "}
              é uma autarquia federal de ensino.
            </p>
            <p>
              Fundada em 1909, como Escola de Aprendizes Artífices, é
              reconhecida pela sociedade paulista por sua excelência no ensino
              público gratuito de qualidade.
            </p>
            <p>
              Durante sua história, recebeu, também, os nomes de Escola Técnica
              Federal de São Paulo e Centro Federal de Educação Tecnológica de
              São Paulo. Com a transformação em Instituto, em dezembro de 2008,
              passou a ter relevância de universidade, destacando-se pela
              autonomia.
            </p>
            <p>
              Com a mudança, o Instituto Federal de São Paulo passou a destinar
              50% das vagas para os cursos técnicos e, no mínimo, 20% das vagas
              para os cursos de licenciatura, sobretudo nas áreas de Ciências e
              da Matemática. Complementarmente, continuará oferecendo cursos de
              formação inicial e continuada, tecnologias, engenharias e
              pós-graduação.
            </p>
            <p>
              Além dos cursos presenciais, o Instituto Federal de São Paulo
              oferece os cursos Técnicos em Administração e em Informática para
              Internet e, a partir de 2012, o superior de Formação de
              Professores na modalidade de Ensino a Distância (EaD).
            </p>
            <p>
              O IFSP é organizado em diversos câmpus e possui mais de 40 mil
              alunos matriculados nas 36 unidades distribuídas pelo estado de
              São Paulo.;
            </p>
            <p>
              Localizado em{" "}
              <strong>
                Rua Pedro Vicente, 625 - Canindé - São Paulo - SP - Brasil -
                Cep: 01109-010
              </strong>
            </p>
          </div>
        );
      }

      const container = document.getElementById("root-sobre");

      const root = ReactDOM.createRoot(container);
      root.render(<SobreConteudo />);
    </script>
  </body>
</html>
